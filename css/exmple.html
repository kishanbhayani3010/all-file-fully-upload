<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
           background: #020202;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; b
        }
        /*card-design*/
        .card{
            width: 250px;
            height: 150px;
            background:#2443bf;
            color: rgb(57, 57, 57);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            border-radius: 15px;
            transition: all 0.8s ease;
        }
        .card:hover{
            transform: scale(1.1)rotate(3deg);
            background: linear-gradient(135deg,#00ffcc,#2443bf);
            box-shadow:0 0 20px #a8e5fb,
                       0  0 40px #bffe76,#7cec83,
                       0  0  60px #00ffcc;
            cursor: pointer;
            display: flex;

        }
        .table{
            align-items: center;
           justify-content: center;
           background-color: rgb(255, 233, 233);
           border-top-right-radius: 0.6s;
           border-radius: 0.5s;
           border-color: #aecdc7; }
           .font{
            background-color: azure;
             
           }
        
    </style>
</head>
<body>
    <h1>
       <table><tr><td><div class="card" ><span>vertical flex</span></div></td></tr></table>
    </h1>
    <table><tr><td><div class="card"><b>login</b></div></td></tr>
    <tr><td><div class="card"><b>subbmitted</b></div></td></tr>
    <tr><td><div class="card"><b>posting</b></div></td></tr></table>
    <table>

        </tr>

                </div>
            </td></tr>
           <tr><td>
                <div class="card">

                </div>
            </td></tr> 
            
        
    </table>
</body>
</html>
